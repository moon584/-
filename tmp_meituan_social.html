  <script>
  (function () {
    var lastInstance = {}; // 上一次错误实例

    // 错误上报过滤
    function onErrorPush(instance) {
      console.log('instance', instance);
      // qq 浏览器过滤 "sec_category": "Cannot read property 'getBoundingClientRect' of undefined"
      const isGetBoundingClientRect = (instance.sec_category || '').indexOf('getBoundingClientRect') > -1;
      const isQQBrowser = (window.navigator.userAgent || '').indexOf('QQBrowser') > -1;
      if (isQQBrowser && isGetBoundingClientRect) {
        return undefined;
      }
      // 过滤 因接口错误已手动上报，过滤重复上报的 unhandledrejection
      if(typeof instance.sec_category === 'string' && instance.sec_category.includes('unhandledrejection') && lastInstance.tags && (lastInstance.tags.type === 'bizError' || lastInstance.tags.type === 'httpError')){
        return undefined;
      }
      // 过滤 因已上报自定义静态资源异常所以将此次捕获过滤
      if(instance.category === 'jsError' && typeof instance.content === 'string' && instance.content.match(/Loading chunk .* failed/)){
        let sourceMatch = instance.content.match(/error:.*?[.]js/g);
        let sourceName = sourceMatch && sourceMatch.length > 0 && sourceMatch[0];
        window.owl('addError', {
          name: '静态资源异常 ' + (document.title || '-'),
          msg: instance.content,
        }, {
          level: 'error',
          category: 'resourceError',
          tags: {
            pageUrl: window.location.href || '',
            type: '静态资源异常',
            sourceName,
          },
        });
        return undefined;
      }
      // 过滤 浏览器插件导致的js异常 和 表单异步校验的异常不进行上报
      if (instance.category === 'jsError') {
        let contentString = JSON.stringify(instance.content);
        if (contentString.includes('extensions') || contentString.includes('chrome-extension') || contentString.includes('invalidFields')) {
          return undefined;
        }
      }
      // 过滤 浏览器导致的 ResizeObserver loop limit exceeded 异常
      if(typeof instance.sec_category === 'string' && instance.sec_category.includes('ResizeObserver loop limit exceeded')){
        return undefined;
      }
      lastInstance = instance || {};
      return instance;
    }

    owl('start',{
      project: 'com.sankuai.recruitment.official.website',
devMode: false,
pageUrl: window.location.host + window.location.pathname,
isSPA: true,
resource: {"sampleApi":1,"enableStatusCheck":true},
disableCache: true,
webVersion: '',
autoCatch: {"ajax":false,"console":false,"fetch":false,"page":true},
enableLogTrace: true,
page: {"sample":1,"fstPerfAnalysis":true,"logSlowView":true},
ignoreList: {"ajax":[],"resource":[]},
image: {"flag":true,"fileSize":1024,"duration":3000},
error: {"sample":1,"formatUnhandledRejection":true},
SPA: {"autoPV":true,"getFST":true},
      logan: {
        enable: true,
        version: '2.1.4',
        Logan: window.Logan,
        config: {
          devMode: false,
        },
      },
      onErrorPush: onErrorPush,
    });
  })();
